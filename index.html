<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Território - Caisson</title>
    <style>
        :root { --primary: #e67e22; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --info: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; overflow: hidden; }

        /* Painel Esquerdo: Mapa e Desenho */
        .map-section { flex: 2; position: relative; display: flex; flex-direction: column; padding: 10px; }
        .canvas-container { position: relative; flex: 1; background: #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #mapImage { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 1; }
        #drawingCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; z-index: 2; }
        
        #canvaWrapper { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 3; display: none; background: white; 
        }

        .map-controls { background: white; padding: 10px; display: flex; gap: 15px; border-radius: 8px; margin-bottom: 10px; align-items: center; z-index: 10; }
        .btn-tool { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: white; }
        .btn-tool.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Painel Direito */
        .sidebar { flex: 1; background: white; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        .stats-box { background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .stats-box h1 { margin: 0; font-size: 1.8rem; }

        .territorio-config { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc; }
        
        .quadra-selector-container { margin-bottom: 20px; }
        .quadra-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .quadra-num { 
            padding: 8px 2px; border: 1px solid #ddd; border-radius: 4px; 
            text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; background: #f9f9f9;
        }
        .quadra-num.selected { background: var(--dark); color: white; }

        .form-group { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-save { background: var(--success); }
        .btn-clear { background: var(--danger); font-size: 0.8rem; }

        .history-item { border-left: 5px solid var(--primary); background: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .delete-item { position: absolute; top: 5px; right: 5px; color: var(--danger); cursor: pointer; font-weight: bold; }
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; color: white; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="map-section">
        <div class="map-controls">
            <strong>Ferramentas:</strong>
            <button class="btn-tool active" id="penBtn" onclick="setTool('pen')">🖋️ Caneta</button>
            <button class="btn-tool" id="eraserBtn" onclick="setTool('eraser')">🧽 Apagar</button>
            <button class="btn-tool" onclick="clearCanvas()">🗑️ Limpar Desenho</button>
        </div>
        <div class="canvas-container" id="container">
            <img src="image_da09bf.png" id="mapImage">
            <canvas id="drawingCanvas"></canvas>
            <div id="canvaWrapper">
                <iframe loading="lazy" style="width: 100%; height: 100%; border: none;"
                    src="https://www.canva.com/design/DAHJl5rVNdQ/d-B39fBg9nW6NuwmvIHOgw/view?embed" allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="stats-box">
            <small>Território</small>
            <h1>Unidade 205 ímpar</h1>
        </div>

        <div class="territorio-config">
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Início do Território</label>
                    <input type="date" id="dataInicioTerritorio">
                </div>
                <div style="flex: 1;">
                    <label>Fim do Território</label>
                    <input type="date" id="dataFimTerritorio">
                </div>
            </div>
        </div>

        <div class="quadra-selector-container">
            <label>N° da Quadra:</label>
            <div class="quadra-grid" id="quadraGrid"></div>
        </div>

        <div class="form-group">
            <label>Quadra Selecionada</label>
            <input type="text" id="quadraNome" readonly placeholder="Selecione no grid acima">
            
            <label>Atualização da Quadra:</label>
            <select id="statusQuadra">
                <option value="Em andamento">🟡 Em andamento</option>
                <option value="Concluído">🟢 Concluído</option>
            </select>

            <label>Observações</label>
            <textarea id="obs" rows="3" placeholder="Relate o progresso nesta quadra..."></textarea>

            <button class="btn-action btn-save" onclick="salvarQuadra()">Salvar Atualização</button>
        </div>

        <div id="historico">
            <h3>Histórico de Visitas</h3>
        </div>
        
        <button class="btn-action btn-clear" style="margin-top: 20px;" onclick="limparHistorico()">Limpar Dados do Sistema</button>
    </div>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        const canvaWrapper = document.getElementById('canvaWrapper');
        let drawing = false;
        let currentTool = 'pen';
        let selectedQuadra = null;

        const quadraGrid = document.getElementById('quadraGrid');
        for (let i = 1; i <= 42; i++) {
            const div = document.createElement('div');
            div.className = 'quadra-num';
            div.innerText = i;
            div.onclick = () => toggleQuadra(i, div);
            quadraGrid.appendChild(div);
        }

        function toggleQuadra(num, element) {
            const inputNome = document.getElementById('quadraNome');
            if (selectedQuadra === num) {
                selectedQuadra = null;
                element.classList.remove('selected');
                canvaWrapper.style.display = 'none';
                inputNome.value = '';
            } else {
                document.querySelectorAll('.quadra-num').forEach(el => el.classList.remove('selected'));
                selectedQuadra = num;
                element.classList.add('selected');
                canvaWrapper.style.display = 'block';
                inputNome.value = 'Quadra ' + num;
            }
        }

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineWidth = currentTool === 'pen' ? 3 : 25;
            ctx.lineCap = 'round';
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = 'rgba(230, 126, 34, 0.8)';
            }
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('penBtn').classList.toggle('active', tool === 'pen');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        }

        function clearCanvas() {
            if(confirm("Apagar desenhos do mapa?")) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function salvarQuadra() {
            const nome = document.getElementById('quadraNome').value;
            const status = document.getElementById('statusQuadra').value;
            const obs = document.getElementById('obs').value;

            if(!nome) return alert("Selecione uma quadra primeiro!");

            const registro = { 
                id: Date.now(), 
                nome, 
                status, 
                obs, 
                data: new Date().toLocaleDateString('pt-BR') 
            };
            
            let registros = JSON.parse(localStorage.getItem('mapa_caisson')) || [];
            registros.unshift(registro);
            localStorage.setItem('mapa_caisson', JSON.stringify(registros));

            atualizarInterface();
            document.getElementById('obs').value = '';
        }

        function atualizarInterface() {
            const lista = document.getElementById('historico');
            const registros = JSON.parse(localStorage.getItem('mapa_caisson')) || [];
            lista.innerHTML = '<h3>Histórico de Visitas</h3>';

            registros.forEach(reg => {
                const color = reg.status === 'Concluído' ? 'var(--success)' : 'var(--info)';
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="delete-item" onclick="removerItem(${reg.id})">×</span>
                    <strong>${reg.nome}</strong> 
                    <span class="status-badge" style="background:${color}">${reg.status}</span><br>
                    <small>🕒 Registrado em: ${reg.data}</small>
                    <p style="margin:5px 0; font-size:0.85rem;">${reg.obs}</p>
                `;
                lista.appendChild(item);
            });
        }

        function removerItem(id) {
            let registros = JSON.parse(localStorage.getItem('mapa_caisson')) || [];
            registros = registros.filter(r => r.id !== id);
            localStorage.setItem('mapa_caisson', JSON.stringify(registros));
            atualizarInterface();
        }

        function limparHistorico() {
            if(confirm("Deseja apagar todos os dados salvos?")) {
                localStorage.removeItem('mapa_caisson');
                atualizarInterface();
            }
        }

        window.onload = atualizarInterface;
    </script>
</body>
</html>
